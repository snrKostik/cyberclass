{% load static %}
<link rel="stylesheet" href="{% static 'notes/css/custom.css' %}">
<h1>{% if note %}Редактировать{% else %}Создать{% endif %} заметку</h1>

<form method="post">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Заголовок" value="{{ note.title|default:'' }}"><br>
    <textarea name="content" placeholder="Текст">{{ note.content|default:'' }}</textarea><br>
    <button type="submit">Сохранить</button>
</form>

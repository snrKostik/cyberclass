{% load static %}
<link rel="stylesheet" href="{% static 'notes/css/custom.css' %}">
<h1>Вход</h1>

<form method="post">
    {% csrf_token %}
    <p>Логин:<br><input type="text" name="username" required></p>
    <p>Пароль:<br><input type="password" name="password" required></p>
    <button type="submit">Войти</button>
</form>

<a href="{% url 'register' %}">Нет аккаунта? Зарегистрироваться</a>
